---
- name: Deploy Docker Container
  hosts: all
  become: yes
  tasks:
    - name: Login to Docker Hub
      shell: docker login -u "{{ docker_user }}" -p "{{ docker_password }}"

    - name: Pull latest image
      docker_image:
        name: "{{ docker_user }}/scientific_calculator:latest"
        source: pull

    - name: Stop and remove existing container
      shell: docker rm -f scientific_calculator || true

    - name: Run new container
      docker_container:
        name: scientific_calculator
        image: "{{ docker_user }}/scientific_calculator:latest"
        state: started
        restart_policy: always
        ports:
          - "8080:8080"